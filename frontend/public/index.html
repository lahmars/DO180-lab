<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OpenShift GitOps Auto Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/patternfly/3.59.5/css/patternfly.min.css">
    <style>
        body { padding-top: 60px; background-color: #f5f5f5; }
        .card-pf { background: #fff; padding: 30px; border-top: 4px solid #0088ce; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 col-md-offset-2 card-pf">
                <h2>🚀 Déploiement Automatique "From Git"</h2>
                <p class="text-muted">Aucune action manuelle requise sur le cluster.</p>
                <hr>
                
                <div class="alert alert-info">
                    <strong>API Interne (DNS) :</strong> <code id="api-endpoint">...</code>
                </div>

                <div class="form-group">
                    <label for="todo-input">Nouvelle entrée MongoDB :</label>
                    <div class="input-group">
                        <input type="text" id="todo-input" class="form-control" placeholder="Ex: Valider mon Lab OpenShift">
                        <span class="input-group-btn">
                            <button class="btn btn-primary" type="button" onclick="addTodo()">Envoyer</button>
                        </span>
                    </div>
                </div>

                <h3>Données synchronisées :</h3>
                <ul id="todo-list" class="list-group"><li class="list-group-item text-center text-muted">Chargement...</li></ul>
            </div>
        </div>
    </div>

    <script src="/config.js"></script>
    <script>
        document.getElementById('api-endpoint').innerText = window.BACKEND_URL;

        async function fetchTodos() {
            try {
                const res = await fetch(`${window.BACKEND_URL}/api/todos`);
                const todos = await res.json();
                const list = document.getElementById('todo-list');
                list.innerHTML = '';
                if (todos.length === 0) {
                    list.innerHTML = '<li class="list-group-item text-center text-muted">La base est vide.</li>';
                    return;
                }
                todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item';
                    li.innerText = todo.text;
                    list.appendChild(li);
                });
            } catch (err) {
                document.getElementById('todo-list').innerHTML = '<li class="list-group-item list-group-item-danger">Erreur API</li>';
            }
        }

        async function addTodo() {
            const input = document.getElementById('todo-input');
            if (!input.value.trim()) return;
            await fetch(`${window.BACKEND_URL}/api/todos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input.value })
            });
            input.value = '';
            fetchTodos();
        }
        fetchTodos();
    </script>
</body>
</html>
