<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenShift Multi-Tier Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/patternfly/3.59.5/css/patternfly.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/patternfly/3.59.5/css/patternfly-additions.min.css">
    <style>
        body { padding-top: 50px; background-color: #f1f1f1; }
        .card-pf { background: #fff; padding: 25px; border-top: 4px solid #0088ce; border-radius: 3px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 col-md-offset-2 card-pf">
                <h2>Platform Demo : Architecture Multi-tiers</h2>
                <p class="text-muted">Démonstration d'un flux découplé Front ➡️ Back ➡️ Database sur OpenShift.</p>
                <hr>
                
                <div class="alert alert-info">
                    <span class="pficon pficon-info"></span>
                    <strong>API Target:</strong> <code id="api-endpoint">Loading...</code>
                </div>

                <div class="form-group">
                    <label for="todo-input" class="control-label">Nouvelle entrée inventaire / tâche :</label>
                    <div class="input-group">
                        <input type="text" id="todo-input" class="form-control" placeholder="Ex: Valider le déploiement S2I">
                        <span class="input-group-btn">
                            <button class="btn btn-primary" type="button" onclick="addTodo()">Envoyer</button>
                        </span>
                    </div>
                </div>

                <h3>Données synchronisées (MongoDB) :</h3>
                <ul id="todo-list" class="list-group"></ul>
            </div>
        </div>
    </div>

    <script src="/config.js"></script>
    <script>
        document.getElementById('api-endpoint').innerText = window.BACKEND_URL;

        async function fetchTodos() {
            try {
                const res = await fetch(`${window.BACKEND_URL}/api/todos`);
                const todos = await res.json();
                const list = document.getElementById('todo-list');
                list.innerHTML = '';
                if(todos.length === 0) {
                    list.innerHTML = '<li class="list-group-item text-center text-muted">Aucune donnée dans la base.</li>';
                    return;
                }
                todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item';
                    li.innerText = todo.text;
                    list.appendChild(li);
                });
            } catch (err) {
                console.error("Impossible de joindre le Backend:", err);
            }
        }

        async function addTodo() {
            const input = document.getElementById('todo-input');
            if (!input.value.trim()) return;

            try {
                await fetch(`${window.BACKEND_URL}/api/todos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input.value })
                });
                input.value = '';
                fetchTodos();
            } catch (err) {
                alert("Erreur lors de l'envoi au backend");
            }
        }

        // Init
        fetchTodos();
    </script>
</body>
</html>
